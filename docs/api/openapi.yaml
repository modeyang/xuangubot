openapi: 3.0.3
info:
  title: Xuangutong MVP Public API
  version: 0.1.0
  description: |
    Public, read-only endpoints for the Nuxt MVP.

servers:
  - url: http://localhost:3000

paths:
  /api/home:
    get:
      summary: Home modules
      description: Returns enabled homepage modules in display order.
      responses:
        '200':
          description: OK
          headers:
            Cache-Control:
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                required: [modules]
                properties:
                  modules:
                    type: array
                    items:
                      $ref: '#/components/schemas/HomeModule'

  /api/plans:
    get:
      summary: Enabled billing plan
      description: Returns the single enabled plan used by the MVP checkout.
      responses:
        '200':
          description: OK
          headers:
            Cache-Control:
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                required: [plan]
                properties:
                  plan:
                    $ref: '#/components/schemas/Plan'

  /api/stocks/{symbol}:
    get:
      summary: Stock snapshot
      parameters:
        - name: symbol
          in: path
          required: true
          description: Stock symbol as a string (leading zeroes preserved).
          schema:
            type: string
      responses:
        '200':
          description: OK
          headers:
            Cache-Control:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockSnapshot'
        '400':
          description: Invalid symbol
        '404':
          description: Not found

  /api/stocks/{symbol}/quotes:
    get:
      summary: Minute-level quote snapshots
      parameters:
        - name: symbol
          in: path
          required: true
          schema: { type: string }
        - name: limit
          in: query
          required: false
          description: Max number of rows (default 240, max 2000).
          schema: { type: integer, minimum: 1, maximum: 2000 }
      responses:
        '200':
          description: OK
          headers:
            Cache-Control:
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                required: [symbol, quotes]
                properties:
                  symbol: { type: string }
                  quotes:
                    type: array
                    items:
                      $ref: '#/components/schemas/StockQuote'
        '400':
          description: Invalid symbol
        '404':
          description: Not found

  /api/stocks/{symbol}/daily-bars:
    get:
      summary: Daily bars
      parameters:
        - name: symbol
          in: path
          required: true
          schema: { type: string }
        - name: limit
          in: query
          required: false
          description: Max number of rows (default 120, max 3650).
          schema: { type: integer, minimum: 1, maximum: 3650 }
      responses:
        '200':
          description: OK
          headers:
            Cache-Control:
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                required: [symbol, dailyBars]
                properties:
                  symbol: { type: string }
                  dailyBars:
                    type: array
                    items:
                      $ref: '#/components/schemas/DailyBar'
        '400':
          description: Invalid symbol
        '404':
          description: Not found

  /api/themes/{id}:
    get:
      summary: Theme details
      parameters:
        - name: id
          in: path
          required: true
          description: Numeric theme ID as a string.
          schema:
            type: string
            pattern: '^[0-9]+$'
      responses:
        '200':
          description: OK
          headers:
            Cache-Control:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThemeDetails'
        '400':
          description: Invalid ID
        '404':
          description: Not found

  /api/articles/{id}:
    get:
      summary: Article details
      parameters:
        - name: id
          in: path
          required: true
          description: Numeric article ID as a string.
          schema:
            type: string
            pattern: '^[0-9]+$'
      responses:
        '200':
          description: OK
          headers:
            Cache-Control:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleDetails'
        '400':
          description: Invalid ID
        '404':
          description: Not found

  /api/search:
    get:
      summary: Search (grouped)
      parameters:
        - name: q
          in: query
          required: true
          description: Search query (min length 2).
          schema:
            type: string
            minLength: 2
            maxLength: 100
      responses:
        '200':
          description: OK
          headers:
            Cache-Control:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          description: Invalid query

  /api/auth/request-code:
    post:
      summary: Request login code (fake SMS)
      description: |
        Requests a one-time login code for the provided phone number.

        In non-development environments (`APP_ENV !== development`), the phone must be allowlisted
        in `beta_access_phones` with `enabled=1`.

        The code is never returned from this endpoint. Admins can view the latest debug code
        via the beta access admin tooling.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone:
                  type: string
                  description: Phone number (digits only or formatted; server normalizes to digits).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
        '400':
          description: Invalid input
        '403':
          description: Not allowlisted (non-development)
        '429':
          description: Rate limited

  /api/auth/verify-code:
    post:
      summary: Verify login code and create session
      description: |
        Verifies a one-time code and sets a signed HTTP-only `xgt_session_token` cookie.

        In non-development environments (`APP_ENV !== development`), the phone must be allowlisted
        in `beta_access_phones` with `enabled=1`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, code]
              properties:
                phone: { type: string }
                code: { type: string, description: 6-digit code }
      responses:
        '200':
          description: OK
          headers:
            Set-Cookie:
              schema: { type: string }
              description: Signed HTTP-only session cookie (`xgt_session_token`).
          content:
            application/json:
              schema:
                type: object
                required: [ok, user]
                properties:
                  ok: { type: boolean }
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Invalid input or invalid code
        '403':
          description: Not allowlisted (non-development)
        '429':
          description: Rate limited or temporarily locked out

  /api/auth/logout:
    post:
      summary: Logout
      description: Clears the session cookie and deletes the server-side session (if present).
      responses:
        '200':
          description: OK
          headers:
            Set-Cookie:
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }

  /api/me:
    get:
      summary: Current session user
      description: Returns the current logged-in user from the session cookie, or null.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    anyOf:
                      - $ref: '#/components/schemas/User'
                    nullable: true

  /api/admin/beta-access:
    get:
      summary: Beta allowlist and debug codes
      description: Admin-only endpoint for listing allowlisted phones and latest debug OTP codes.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [phones, debugCodes]
                properties:
                  phones:
                    type: array
                    items:
                      $ref: '#/components/schemas/BetaAccessPhone'
                  debugCodes:
                    type: array
                    items:
                      $ref: '#/components/schemas/DebugCode'
        '401':
          description: Not authenticated
        '403':
          description: Admin only
    post:
      summary: Mutate beta allowlist
      description: Admin-only endpoint to add, enable, disable, or remove allowlisted phones.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, phone]
              properties:
                action:
                  type: string
                  enum: [add, enable, disable, remove]
                phone:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
                  inserted: { type: boolean, nullable: true }
        '400':
          description: Invalid input
        '401':
          description: Not authenticated
        '403':
          description: Admin only

  /api/admin/articles/{id}/publish:
    post:
      summary: Publish an article
      description: |
        Admin-only endpoint that publishes an article.

        Behavior:
        - Derives `body_html` from `body_markdown`
        - Sets `status=published` and `published_at`
        - Updates `search_documents` (FTS) for public articles
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                publishedAt:
                  type: string
                  format: date-time
                  description: Optional override; defaults to now.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok, id, publishedAt]
                properties:
                  ok: { type: boolean }
                  id: { type: integer }
                  publishedAt: { type: string, format: date-time }
        '400':
          description: Invalid input
        '401':
          description: Not authenticated
        '403':
          description: Admin only
        '404':
          description: Not found

  /api/admin/articles/{id}/unpublish:
    post:
      summary: Unpublish an article
      description: |
        Admin-only endpoint that unpublishes an article.

        Behavior:
        - Sets `status=draft` and clears `published_at`
        - Removes search visibility from `search_documents` (FTS)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok, id]
                properties:
                  ok: { type: boolean }
                  id: { type: integer }
        '400':
          description: Invalid input
        '401':
          description: Not authenticated
        '403':
          description: Admin only
        '404':
          description: Not found

  /api/admin/homepage-modules:
    post:
      summary: Manage homepage modules
      description: |
        Admin-only endpoint for homepage module editing.

        Supported actions:
        - `list`: list all modules (including disabled)
        - `setEnabled`: enable/disable a module
        - `setTitle`: change a module title
        - `setConfig`: update `config_json` with validation based on `module_key`
        - `reorder`: set a new module ordering
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [modules]
                properties:
                  modules:
                    type: array
                    items:
                      $ref: '#/components/schemas/HomepageModuleAdmin'
        '400':
          description: Invalid input
        '401':
          description: Not authenticated
        '403':
          description: Admin only

  /api/admin/theme-stocks/sync:
    post:
      summary: Sync/correct theme-stock relations
      description: |
        Admin-only endpoint for manual correction or best-effort resync of `theme_stocks`.

        Actions:
        - `correct`: replace all relations for a theme using provided stock symbols
        - `resync`: rebuild relations from the latest `theme_snapshots.payload_json` (best-effort)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, themeId]
              properties:
                action: { type: string, enum: [correct, resync] }
                themeId: { type: integer }
                symbols:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok, themeId, appliedSymbols, missingSymbols, source]
                properties:
                  ok: { type: boolean }
                  themeId: { type: integer }
                  appliedSymbols:
                    type: array
                    items: { type: string }
                  missingSymbols:
                    type: array
                    items: { type: string }
                  source: { type: string }
        '400':
          description: Invalid input
        '401':
          description: Not authenticated
        '403':
          description: Admin only
        '404':
          description: Not found

  /api/admin/ingest-runs:
    get:
      summary: List ingestion runs
      description: Admin-only endpoint for listing recent ingestion runs.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [runs]
                properties:
                  runs:
                    type: array
                    items:
                      $ref: '#/components/schemas/IngestRun'
        '401':
          description: Not authenticated
        '403':
          description: Admin only

  /api/admin/orders:
    get:
      summary: List orders
      description: Admin-only endpoint for listing recent orders.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [orders]
                properties:
                  orders:
                    type: array
                    items:
                      $ref: '#/components/schemas/OrderAdmin'
        '401':
          description: Not authenticated
        '403':
          description: Admin only

components:
  schemas:
    User:
      type: object
      required: [id, phone, role, displayName]
      properties:
        id: { type: integer }
        phone: { type: string }
        role: { type: string }
        displayName: { type: string, nullable: true }

    HomeModule:
      type: object
      required: [id, moduleKey, title]
      properties:
        id: { type: integer }
        moduleKey: { type: string }
        title: { type: string }
        sortOrder: { type: integer, nullable: true }
        config: { nullable: true }

    HomepageModuleAdmin:
      type: object
      required: [id, moduleKey, title, enabled]
      properties:
        id: { type: integer }
        moduleKey: { type: string }
        title: { type: string }
        configJson: { type: string, nullable: true }
        sortOrder: { type: integer, nullable: true }
        enabled: { type: boolean }

    IngestRun:
      type: object
      required: [id, jobName, startedAt, status]
      properties:
        id: { type: integer }
        jobName: { type: string }
        sourceName: { type: string, nullable: true }
        startedAt: { type: string, format: date-time }
        finishedAt: { type: string, format: date-time, nullable: true }
        status: { type: string }
        summaryJson: { type: string, nullable: true }

    OrderAdmin:
      type: object
      required: [id, status, provider, amountCents, createdAt, userId, userPhone, planCode]
      properties:
        id: { type: integer }
        status: { type: string }
        provider: { type: string }
        amountCents: { type: integer }
        providerOrderId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        paidAt: { type: string, format: date-time, nullable: true }
        userId: { type: integer }
        userPhone: { type: string }
        planCode: { type: string }

    Plan:
      type: object
      required: [id, planCode, name, durationDays, priceCents, enabled]
      properties:
        id: { type: integer }
        planCode: { type: string }
        name: { type: string }
        durationDays: { type: integer }
        priceCents: { type: integer }
        enabled: { type: integer, description: '0 or 1 from SQLite' }

    BetaAccessPhone:
      type: object
      required: [phone, enabled, createdAt]
      properties:
        phone: { type: string }
        enabled: { type: integer, description: '0 or 1 from SQLite' }
        createdAt: { type: string }
        createdBy: { type: integer, nullable: true }

    DebugCode:
      type: object
      required: [phone, codePlain, createdAt]
      properties:
        phone: { type: string }
        codePlain: { type: string }
        createdAt: { type: string }

    Stock:
      type: object
      required: [id, symbol, exchange]
      properties:
        id: { type: integer }
        symbol: { type: string }
        exchange: { type: string }
        name: { type: string, nullable: true }
        status: { type: string, nullable: true }
        industry: { type: string, nullable: true }
        profileJson: { type: string, nullable: true }

    StockQuote:
      type: object
      required: [quotedAt]
      properties:
        quotedAt: { type: string, description: ISO timestamp }
        lastPrice: { type: number, nullable: true }
        pctChange: { type: number, nullable: true }
        turnover: { type: number, nullable: true }
        volume: { type: integer, nullable: true }

    DailyBar:
      type: object
      required: [stockId, tradeDate]
      properties:
        stockId: { type: integer }
        tradeDate: { type: string }
        open: { type: number, nullable: true }
        high: { type: number, nullable: true }
        low: { type: number, nullable: true }
        close: { type: number, nullable: true }
        volume: { type: integer, nullable: true }
        turnover: { type: number, nullable: true }

    Theme:
      type: object
      required: [id, slug, name]
      properties:
        id: { type: integer }
        slug: { type: string }
        name: { type: string }
        summary: { type: string, nullable: true }
        sourceRef: { type: string, nullable: true }

    ThemeSnapshot:
      type: object
      required: [capturedAt]
      properties:
        capturedAt: { type: string }
        heatScore: { type: number, nullable: true }
        rank: { type: integer, nullable: true }
        payload: { nullable: true }

    Article:
      type: object
      required: [id, slug, title, articleType, visibility, status]
      properties:
        id: { type: integer }
        slug: { type: string }
        title: { type: string }
        excerpt: { type: string, nullable: true }
        bodyMarkdown: { type: string, nullable: true }
        bodyHtml: { type: string, nullable: true }
        articleType: { type: string }
        visibility: { type: string }
        status: { type: string }
        coverUrl: { type: string, nullable: true }
        publishedAt: { type: string, nullable: true }
        sourceName: { type: string, nullable: true }
        sourceRef: { type: string, nullable: true }

    StockSnapshot:
      type: object
      required: [stock, quote, themes, articles, announcements]
      properties:
        stock:
          $ref: '#/components/schemas/Stock'
        quote:
          allOf:
            - $ref: '#/components/schemas/StockQuote'
          nullable: true
        themes:
          type: array
          items:
            type: object
            required: [id, slug, name, score, source]
            properties:
              id: { type: integer }
              slug: { type: string }
              name: { type: string }
              summary: { type: string, nullable: true }
              score: { type: number, nullable: true }
              source: { type: string, nullable: true }
        articles:
          type: array
          items:
            $ref: '#/components/schemas/ArticleSummary'
        announcements:
          type: array
          items:
            $ref: '#/components/schemas/Announcement'

    ThemeDetails:
      type: object
      required: [theme, stocks, snapshot, articles]
      properties:
        theme:
          $ref: '#/components/schemas/Theme'
        stocks:
          type: array
          items:
            $ref: '#/components/schemas/ThemeStock'
        snapshot:
          allOf:
            - $ref: '#/components/schemas/ThemeSnapshot'
          nullable: true
        articles:
          type: array
          items:
            $ref: '#/components/schemas/ArticleSummary'

    ArticleDetails:
      type: object
      required: [article, access, relatedStocks, relatedThemes]
      properties:
        article:
          $ref: '#/components/schemas/Article'
        access:
          type: object
          required: [visibility, allowed, reason]
          properties:
            visibility: { type: string }
            allowed: { type: boolean }
            reason: { type: string, nullable: true }
        relatedStocks:
          type: array
          items:
            type: object
            required: [id, symbol, exchange]
            properties:
              id: { type: integer }
              symbol: { type: string }
              exchange: { type: string }
              name: { type: string, nullable: true }
              status: { type: string, nullable: true }
              industry: { type: string, nullable: true }
        relatedThemes:
          type: array
          items:
            $ref: '#/components/schemas/Theme'

    SearchResponse:
      type: object
      required: [stocks, themes, articles]
      properties:
        stocks:
          type: array
          items:
            type: object
            required: [id, symbol, exchange]
            properties:
              id: { type: integer }
              symbol: { type: string }
              exchange: { type: string }
              name: { type: string, nullable: true }
              status: { type: string, nullable: true }
              industry: { type: string, nullable: true }
        themes:
          type: array
          items:
            $ref: '#/components/schemas/Theme'
        articles:
          type: array
          items:
            type: object
            required: [id, slug, title, articleType, publishedAt, sourceName]
            properties:
              id: { type: integer }
              slug: { type: string }
              title: { type: string }
              excerpt: { type: string, nullable: true }
              articleType: { type: string }
              publishedAt: { type: string, nullable: true }
              sourceName: { type: string, nullable: true }

    ThemeStock:
      type: object
      required: [id, symbol, exchange, score, source]
      properties:
        id: { type: integer }
        symbol: { type: string }
        exchange: { type: string }
        name: { type: string, nullable: true }
        status: { type: string, nullable: true }
        industry: { type: string, nullable: true }
        profileJson: { type: string, nullable: true }
        score: { type: number, nullable: true }
        source: { type: string, nullable: true }

    ArticleSummary:
      type: object
      required: [id, slug, title, articleType, visibility, status]
      properties:
        id: { type: integer }
        slug: { type: string }
        title: { type: string }
        excerpt: { type: string, nullable: true }
        articleType: { type: string }
        visibility: { type: string }
        status: { type: string }
        coverUrl: { type: string, nullable: true }
        publishedAt: { type: string, nullable: true }
        sourceName: { type: string, nullable: true }

    Announcement:
      type: object
      required: [id, title]
      properties:
        id: { type: integer }
        title: { type: string }
        summary: { type: string, nullable: true }
        publishedAt: { type: string, nullable: true }
        sourceName: { type: string, nullable: true }
        sourceUrl: { type: string, nullable: true }
